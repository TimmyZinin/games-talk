    - paragraph [ref=e41]: "Marina just quit her agency job. Three years writing brand copy, running clients. Two weeks ago she decided: <b>i'll try this on my own</b>. Rented a studio in Bushwick. Told her parents «i'm fine». Opened the laptop."
