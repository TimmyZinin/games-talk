    - heading "frequently asked" [level=2] [ref=e114]
    - generic [ref=e115]:
      - heading "how long does a playthrough take?" [level=3] [ref=e116]
      - paragraph [ref=e117]: 30 in-game days ≈ 20-25 real minutes. You can stop anytime — autosave.
    - generic [ref=e118]:
      - heading "can you lose?" [level=3] [ref=e119]
      - paragraph [ref=e120]: Yes. Run out of money (<-$1500), don't eat for 4 days (hunger=0), or comfort near zero after day 15 — the game can end. Odds aren't 100%, but real.
    - generic [ref=e121]:
      - heading "it's a lead magnet — then what?" [level=3] [ref=e122]
      - paragraph [ref=e123]: On day 28, Tim (the real Tim Zinin) writes from inside the game. You can fill out a form and get a personal AI audit.
    - generic [ref=e124]:
      - heading "why a messenger UI?" [level=3] [ref=e125]
      - paragraph [ref=e126]: Because a founder lives in chats. Email, slack, telegram, discord — all through the messenger. The game is about right now.
    - generic [ref=e127]:
      - heading "is there a desktop version?" [level=3] [ref=e128]
      - paragraph [ref=e129]: It runs in the browser on any device. On desktop — keyboard shortcuts (1-9 for actions, Space = end of day).
    - generic [ref=e130]:
      - heading "is it free?" [level=3] [ref=e131]
